<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Dog Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f6f8fd 0%, #f1f5f9 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #1e293b;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h1 {
            margin-bottom: 1.5rem;
            font-size: 1.75rem;
            font-weight: 600;
            color: #0f172a;
        }

        .image-wrapper {
            width: 100%;
            height: 300px;
            background: #f8fafc;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        }

        #dog {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .loading {
            position: absolute;
            font-size: 1.1rem;
            color: #64748b;
            font-weight: 500;
        }

        button {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            width: 100%;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.4);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.3);
        }

        button:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Random Dog Generator 🐶</h1>
        <div class="image-wrapper">
            <div class="loading" id="loading">Ready for a dog!</div>
            <img id="dog" alt="Random Dog" />
        </div>
        <button id="fetchBtn" onclick="getDog()">Generate Image</button>
    </div>

    <script>
        async function getDog() {
            const dogImg = document.getElementById("dog");
            const loading = document.getElementById("loading");
            const btn = document.getElementById("fetchBtn");

            // Update UI state to loading
            dogImg.style.opacity = 0;
            loading.style.display = "block";
            loading.innerText = "Fetching...";
            btn.disabled = true;
            btn.innerText = "Loading...";

            try {
                // Using the webhook-test endpoint as requested
                const res = await fetch("https://donsam163.app.n8n.cloud/webhook/dog-api", {
                    method: "POST"
                });

                if (!res.ok) {
                    throw new Error("Network response was not ok");
                }

                const data = await res.json();

                // Wait for the new image to load before displaying it
                dogImg.onload = () => {
                    loading.style.display = "none";
                    dogImg.style.opacity = 1;
                    btn.disabled = false;
                    btn.innerText = "Get Another Dog";
                };

                // Apply the image URL (the API returns {"url": "..."})
                dogImg.src = data.url || data.image;

            } catch (error) {
                console.error("Error fetching dog:", error);
                loading.innerText = "Failed to load!";
                btn.disabled = false;
                btn.innerText = "Try Again";
            }
        }
    </script>
</body>

</html>
